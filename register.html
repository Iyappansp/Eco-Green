<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - EcoRefill</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-slate-950 text-slate-100 transition-colors duration-300">
    <!-- Space for a back button or logo if needed -->
    <div class="fixed top-8 left-8 z-50">
        <a href="index.html" class="flex items-center gap-2 text-emerald-400 hover:text-emerald-300 transition font-bold">
            <i class="bi bi-arrow-left"></i>
            <span>Back to Home</span>
        </a>
    </div>

    <div class="relative min-h-screen flex items-center justify-center px-4 py-16 overflow-hidden">
        <!-- Background Image with Overlay -->
        <div class="absolute inset-0 z-0">
            <img src="assets/hero-bg.png" alt="Hero Background" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-slate-950/80 backdrop-blur-[4px]"></div>
        </div>
        <div class="w-full max-w-md relative z-10">
            <!-- Register Card -->
            <div class="bg-slate-800/50 border border-emerald-500/20 rounded-2xl p-8 backdrop-blur">
                <div class="text-center mb-8">
                    <a href="index.html" class="inline-block mb-4 hover:scale-105 transition-transform duration-300">
                        <img src="assets/logo.png" alt="EcoRefill Logo" class="h-16 w-auto mx-auto grayscale-0 brightness-110">
                    </a>
                    <h1 class="text-3xl font-bold mb-2">Join EcoRefill</h1>
                    <p class="text-slate-300">Start your zero-waste journey today</p>
                </div>

                <form class="space-y-6" action="dashboard.html">
                    <div>
                        <label class="block text-sm font-semibold mb-2">Full Name</label>
                        <input type="text" class="w-full px-4 py-3 bg-slate-700/50 border border-emerald-500/30 rounded-lg focus:outline-none focus:border-emerald-500 text-white placeholder-slate-500" placeholder="Your name">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold mb-2">Email Address</label>
                        <input type="email" class="w-full px-4 py-3 bg-slate-700/50 border border-emerald-500/30 rounded-lg focus:outline-none focus:border-emerald-500 text-white placeholder-slate-500" placeholder="your@email.com">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold mb-2">Password</label>
                        <input type="password" class="w-full px-4 py-3 bg-slate-700/50 border border-emerald-500/30 rounded-lg focus:outline-none focus:border-emerald-500 text-white placeholder-slate-500" placeholder="••••••••">
                        <p class="text-xs text-slate-400 mt-1">At least 8 characters with uppercase and numbers</p>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold mb-2">Membership Tier</label>
                        <select class="w-full px-4 py-3 bg-slate-700/50 border border-emerald-500/30 rounded-lg focus:outline-none focus:border-emerald-500 text-white">
                            <option>Free Member</option>
                            <option>Eco Pro (₹999/year)</option>
                            <option>Zero Hero (₹2,499/year)</option>
                        </select>
                    </div>

                    <label class="flex items-start gap-3 cursor-pointer">
                        <input type="checkbox" class="accent-emerald-500 mt-1">
                        <span class="text-sm text-slate-400">
                            I agree to the
                            <a href="#" class="text-emerald-400 hover:text-emerald-300">Terms of Service</a>
                            and
                            <a href="#" class="text-emerald-400 hover:text-emerald-300">Privacy Policy</a>
                        </span>
                    </label>

                    <label class="flex items-start gap-3 cursor-pointer">
                        <input type="checkbox" class="accent-emerald-500 mt-1">
                        <span class="text-sm text-slate-400">
                            I want to receive updates about zero-waste tips and exclusive offers
                        </span>
                    </label>

                    <button type="submit" class="w-full py-3 bg-gradient-to-r from-emerald-500 to-teal-500 text-white font-bold rounded-lg hover:shadow-lg hover:shadow-emerald-500/50 transition">
                        Create Account
                    </button>
                </form>

                <!-- Register Link -->
                <p class="text-center text-slate-400 mt-8">
                    Already have an account?
                    <a href="login.html" class="text-emerald-400 hover:text-emerald-300 font-semibold transition">Sign in</a>
                </p>

                <!-- Divider -->
                <div class="flex items-center gap-4 my-8">
                    <div class="flex-1 h-px bg-emerald-500/20"></div>
                    <span class="text-sm text-slate-300">OR</span>
                    <div class="flex-1 h-px bg-emerald-500/20"></div>
                </div>

                <!-- OAuth Options -->
                <div class="space-y-3">
                    <button type="button" class="w-full py-3 border border-emerald-500/30 text-white font-semibold rounded-lg hover:border-emerald-500 hover:bg-emerald-500/10 transition flex items-center justify-center gap-2">
                        <i class="bi bi-google"></i>
                        Continue with Google
                    </button>

                    <button type="button" class="w-full py-3 border border-emerald-500/30 text-white font-semibold rounded-lg hover:border-emerald-500 hover:bg-emerald-500/10 transition flex items-center justify-center gap-2">
                        <i class="bi bi-apple"></i>
                        Continue with Apple
                    </button>
                </div>
            </div>

            <!-- Benefits -->
            <div class="mt-8 space-y-3">
                <div class="flex items-center gap-3 text-sm text-slate-300">
                    <i class="bi bi-check-circle text-emerald-400"></i>
                    <span>Exclusive discounts on refills</span>
                </div>
                <div class="flex items-center gap-3 text-sm text-slate-300">
                    <i class="bi bi-check-circle text-emerald-400"></i>
                    <span>Real-time impact tracking</span>
                </div>
                <div class="flex items-center gap-3 text-sm text-slate-300">
                    <i class="bi bi-check-circle text-emerald-400"></i>
                    <span>Earn refill credits</span>
                </div>
                <div class="flex items-center gap-3 text-sm text-slate-300">
                    <i class="bi bi-check-circle text-emerald-400"></i>
                    <span>Join our sustainability community</span>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
